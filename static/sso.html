<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZFace — Masuk via Z One</title>
<style>
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0E1923; color: #fff; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    text-align: center; padding: 24px;
  }
  .box { max-width: 360px; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #0E6E66;
    border-radius: 50%; margin: 0 auto 18px; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: #B7C2CC; font-size: 0.9rem; line-height: 1.5; }
  .err { color: #F2A65A; }
  a.btn {
    display: inline-block; margin-top: 16px; padding: 10px 18px; border-radius: 8px;
    background: #0E6E66; color: #fff; text-decoration: none; font-size: 0.85rem;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="spinner" id="spinner"></div>
    <p id="msg">Menghubungkan akun dari Z One…</p>
  </div>

<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const token = params.get("token");
  const msgEl = document.getElementById("msg");
  const spinnerEl = document.getElementById("spinner");

  if (!token) {
    spinnerEl.style.display = "none";
    msgEl.className = "err";
    msgEl.textContent = "Token tidak ditemukan. Buka ZFace lewat Z One lagi.";
    return;
  }

  try {
    const r = await fetch("/api/auth/sso-verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token }),
    });
    const d = await r.json();

    if (!r.ok) {
      spinnerEl.style.display = "none";
      msgEl.className = "err";
      msgEl.textContent = d.detail || "Gagal masuk lewat Z One.";
      return;
    }

    localStorage.setItem("zface_token", d.access_token);
    location.replace("/app");
  } catch (err) {
    spinnerEl.style.display = "none";
    msgEl.className = "err";
    msgEl.textContent = "Tidak dapat terhubung ke server ZFace.";
  }
})();
</script>
</body>
</html>
